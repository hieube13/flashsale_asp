# nginx-50pct.conf — Phase C: 50% traffic to .NET (48h)
# Equal split: 50% .NET, 50% Java.
#
# Usage:
#   docker compose -f docker-compose.yml \
#     -f environment/nginx/nginx-50pct.yml up -d
#
# Monitor: Prometheus, Grafana dashboards
# Watch: MySQL pool saturation, Redis hit ratio, Kafka consumer lag
#
# Advance to Phase D (100%) when:
#   - 48h error rate < 0.1%
#   - MySQL max_pool not exhausted
#   - Kafka lag < 1000 messages on consumer group
#   - No p99 regression vs Java baseline

upstream dotnet_api {
    server flashsale.api:5080;
}

upstream java_api {
    server ${JAVA_HOST:-java-app:1122};
}

server {
    listen 80;
    charset utf-8;

    # ── Traffic split ────────────────────────────────────────────
    split_clients "${request_id}" $upstream {
        50%     dotnet_api;
        *       java_api;
    }

    # ── Health — always .NET ────────────────────────────────────
    location = /health {
        proxy_pass         http://dotnet_api;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log        off;
    }

    # ── Routed ───────────────────────────────────────────────────
    location / {
        proxy_pass         http://$upstream;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Upstream      $upstream;
    }
}
