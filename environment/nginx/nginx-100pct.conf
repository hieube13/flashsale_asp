# nginx-100pct.conf — All traffic routed to .NET (Phase D)
# Java app receives zero traffic (kept alive for emergency rollback).

# Runbook:
#   docker compose -f docker-compose.yml \
#     -f environment/nginx/nginx-100pct.yml up -d nginx
#
# Verify:
#   curl -s http://localhost/health
#   curl -s http://localhost/ticket/active
#
# Rollback:
#   docker compose -f docker-compose.yml \
#     -f environment/nginx/nginx-shadow.yml up -d nginx

upstream dotnet_api {
    server flashsale.api:5080;
}

upstream java_api {
    # Java app container name + port.
    # Set via JAVA_HOST env var or edit directly.
    server ${JAVA_HOST:-java-app:1122};
}

server {
    listen 80;
    charset utf-8;

    # ── Health check ──────────────────────────────────────────────
    location = /health {
        proxy_pass         http://dotnet_api;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log        off;
    }

    # ── All routes → .NET ─────────────────────────────────────────
    location / {
        proxy_pass         http://dotnet_api;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — match .NET Kestrel defaults
        proxy_connect_timeout  5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }
}
