# nginx-shadow.conf — Phase A: Shadow traffic (24h)
# Mirrors order requests to .NET but returns Java response.
# Used to diff .NET vs Java response bodies before traffic cutover.
#
# Usage:
#   docker compose -f docker-compose.yml \
#     -f environment/nginx/nginx-shadow.yml up -d
#
# Logs diffs via: docker logs -f flashsale.nginx
#
# Advance to Phase B when shadow diff rate < 0.1%

upstream dotnet_api {
    server flashsale.api:5080;
}

upstream java_api {
    server ${JAVA_HOST:-java-app:1122};
}

server {
    listen 80;
    charset utf-8;

    # ── Health — always .NET ───────────────────────────────────────
    location = /health {
        proxy_pass         http://dotnet_api;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log        off;
    }

    # ── Shadow: mirrored order endpoints ───────────────────────────
    # Body is mirrored to .NET; response always comes from Java.
    location /order/cas {
        internal;                               # only reachable via mirror
        proxy_pass         http://dotnet_api;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_request_buffering off;            # stream body to mirror
        access_log        /var/log/nginx/dotnet-mirror-access.log;
    }

    location /order/mq {
        internal;
        proxy_pass         http://dotnet_api;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        access_log        /var/log/nginx/dotnet-mirror-access.log;
    }

    # ── Primary: all traffic → Java ────────────────────────────────
    location / {
        mirror            /internal/dotnet-mirror;   # shadow copy
        proxy_pass         http://java_api;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
