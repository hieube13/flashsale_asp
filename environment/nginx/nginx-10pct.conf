# nginx-10pct.conf — Phase B: 10% traffic to .NET (24h)
# Uses nginx split_clients for deterministic request splitting by $request_id.
#
# Usage:
#   docker compose -f docker-compose.yml \
#     -f environment/nginx/nginx-10pct.yml up -d
#
# Monitor: Prometheus (9090) → flashsale_* metrics
# Watch: error rate, p99 latency, MySQL pool, Redis ops/sec
#
# Advance to Phase C when: error rate < 0.1%, p99 < 200ms

upstream dotnet_api {
    server flashsale.api:5080;
}

upstream java_api {
    server ${JAVA_HOST:-java-app:1122};
}

server {
    listen 80;
    charset utf-8;

    # ── Traffic split ────────────────────────────────────────────
    # 10% of requests go to .NET, 90% stay on Java.
    split_clients "${request_id}" $upstream {
        10%     dotnet_api;
        *       java_api;
    }

    # ── Health — always .NET ───────────────────────────────────────
    location = /health {
        proxy_pass         http://dotnet_api;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log        off;
    }

    # ── Routed: all traffic ────────────────────────────────────────
    location / {
        proxy_pass         http://$upstream;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Upstream      $upstream;  # tag which backend served
    }
}
