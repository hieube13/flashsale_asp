# docker-compose-100pct.yml — Phase D: 100% .NET (final)
# All traffic routed to .NET. Java app kept alive for emergency rollback.
#
# Run:
#   docker compose -f docker-compose.yml \
#     -f environment/nginx/docker-compose-100pct.yml up -d
#
# Verify:
#   curl http://localhost/health
#   curl http://localhost/ticket/active
#
# Rollback:
#   docker compose -f docker-compose.yml \
#     -f environment/nginx/docker-compose-shadow.yml up -d nginx

version: "3.9"

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: flashsale.nginx
    volumes:
      - ./environment/nginx/nginx-100pct.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      flashsale.api:
        condition: service_healthy
    networks:
      - flashsale-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
