version: "3.9"

services:
  # API runs alongside Java (port 1122). Cutover via nginx routing — see docs/CUTOVER.md (TASK-022).
  flashsale.api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flashsale.api
    ports:
      - "5080:5080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5080
      ConnectionStrings__MySql: "server=mysql;port=3306;database=vetautet;user=root;password=root1234;Pooling=true;MaximumPoolSize=100;MinimumPoolSize=20;"
      Redis__ConnectionString: "redis:6379,abortConnect=false"
      Kafka__BootstrapServers: "kafka:9092"
      Kafka__OrderPlaceTopic: "order-place-topic"
      Kafka__ConsumerGroupId: "order-consumer-group"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - flashsale-net

  mysql:
    image: mysql:8.0
    container_name: flashsale.mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: vetautet
    ports:
      - "3316:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./environment/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot1234"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - flashsale-net

  redis:
    image: redis:7-alpine
    container_name: flashsale.redis
    ports:
      - "6319:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - flashsale-net

  kafka:
    image: bitnami/kafka:3.7
    container_name: flashsale.kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9094:9092"
    networks:
      - flashsale-net

  prometheus:
    image: prom/prometheus:latest
    container_name: flashsale.prometheus
    volumes:
      - ./environment/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - flashsale-net

  grafana:
    image: grafana/grafana:latest
    container_name: flashsale.grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    networks:
      - flashsale-net

volumes:
  mysql-data:

networks:
  flashsale-net:
    driver: bridge