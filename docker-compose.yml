version: "3.9"

services:
  flashsale.api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flashsale.api
    expose:
      - "5080"
    ports:
      - "5080:5080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5080
      ConnectionStrings__SqlServer: "Server=mssql,1433;Database=vetautet;User Id=sa;Password=Test@Pass1234;TrustServerCertificate=True;Pooling=true;Max Pool Size=100;Min Pool Size=20;"
      Redis__ConnectionString: "redis:6379,abortConnect=false"
      Kafka__BootstrapServers: "kafka:9092"
      Kafka__OrderPlaceTopic: "order-place-topic"
      Kafka__ConsumerGroupId: "order-consumer-group"
    depends_on:
      mssql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - flashsale-net

  frontend:
    build:
      context: ./src/FlashSale.WebApp
      dockerfile: Dockerfile
    container_name: flashsale.fe
    ports:
      - "5173:80"
    depends_on:
      - flashsale.api
    networks:
      - flashsale-net

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: flashsale.mssql
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: Test@Pass1234
      MSSQL_DATABASE: vetautet
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
      - ./environment/sqlserver/init:/init:ro
    healthcheck:
      test: ["CMD-SHELL", "sqlcmd -S localhost -U sa -P Test@Pass1234 -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - flashsale-net

  redis:
    image: redis:7-alpine
    container_name: flashsale.redis
    ports:
      - "6319:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - flashsale-net

  kafka:
    image: bitnami/kafka:3.7
    container_name: flashsale.kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9094:9092"
    networks:
      - flashsale-net

  prometheus:
    image: prom/prometheus:latest
    container_name: flashsale.prometheus
    volumes:
      - ./environment/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - flashsale-net

  grafana:
    image: grafana/grafana:latest
    container_name: flashsale.grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    networks:
      - flashsale-net

volumes:
  mssql-data:

networks:
  flashsale-net:
    driver: bridge